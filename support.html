<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — Chariot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --chariot-brown: #8B7D72;
      --chariot-dark: #5C4F47;
      --chariot-light: #F5F1EE;
      --chariot-cream: #FAF8F6;
      --text-primary: #1A1614;
      --text-secondary: #6B5F58;
      --text-muted: #9E8E86;
      --border: #E8E0DB;
      --white: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text-primary); line-height: 1.6; }
    nav { background: var(--chariot-brown); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .nav-logo { font-family: 'Crimson Pro', Georgia, serif; font-size: 1.25rem; letter-spacing: 0.2em; color: white; font-weight: 300; text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.875rem; transition: color 0.2s; }
    .nav-links a:hover { color: white; }
